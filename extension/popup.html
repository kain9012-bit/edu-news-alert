<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>교육동향</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <main>
    <header class="topbar">
      <div>
        <h1>교육동향</h1>
        <p id="statusText">최근 자료를 불러오는 중입니다.</p>
      </div>
      <button id="openOptions" type="button">설정</button>
    </header>

    <section class="briefingSummary">
      <div>
        <span>최근 24시간</span>
        <strong id="briefingCount">0건</strong>
      </div>
      <button id="refreshBriefing" type="button">새로고침</button>
    </section>

    <button id="openDashboard" class="primaryAction" type="button">이전 보도자료 기간 조회</button>

    <section>
      <h2>보도자료</h2>
      <div id="briefingList" class="list empty">표시할 보도자료가 없습니다.</div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
