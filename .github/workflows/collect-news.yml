name: Collect education press releases

on:
  workflow_dispatch:
  schedule:
    # UTC Sun-Thu 21:05 = KST Mon-Fri 06:05
    - cron: "5 21 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect press releases
        env:
          RETENTION_DAYS: "14"
          BRIEFING_HOUR_KST: "6"
          MAX_ITEMS_TOTAL: "3000"
          MAX_ITEMS_PER_SOURCE: "20"
        run: python crawler/collect.py

      - name: Select and classify education trends
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: gemini
          LLM_MODEL: gemini-3.1-flash-lite
        run: python -m harness.run

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update press releases and AI selection"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
